    /* Reset */
    html, body {
      Margin: 0 auto !important;
      padding: 0 !important;
      width: 100% !important;
      height: 100% !important;
    }
    * {
      -ms-text-size-adjust: 100%;
      -webkit-text-size-adjust: 100%;
    }
    .ExternalClass { width: 100%; }
    .ExternalClass, .ExternalClass * { line-height: 100% !important; }
    div[style*="Margin: 16px 0"] { Margin: 0 !important; }
    table, th { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    table {
      border-spacing: 0 !important;
      border-collapse: collapse !important;
      border: none;
      Margin: 0 auto;
      direction: ltr;
    }
    td { vertical-align: top; }
    img {
      -ms-interpolation-mode: bicubic;
      border: 0;
      outline: none;
      text-decoration: none;
    }
    a, a:link, a:visited { color: #000000; }
    .yshortcuts a { border-bottom: none !important; }
    *[x-apple-data-detectors], .x-gmail-data-detectors, .x-gmail-data-detectors *, .aBn {
      border-bottom: none !important;
      cursor: default !important;
      color: inherit !important;
      text-decoration: none !important;
      font-size: inherit !important;
      font-family: inherit !important;
      font-weight: inherit !important;
      line-height: inherit !important;
    }
    .a6S { display: none !important; opacity: 0.01 !important; }
    u + #body a { color: inherit; text-decoration: underline; font-size: inherit; font-family: inherit; font-weight: inherit; line-height: inherit; }

    /* ── Mobile (max-width: 480px) ──────────────────────────────────────── */
    @media all and (max-width: 480px) {
      /* Main container expands full width on mobile */
      table.email-outer { width: 100% !important; max-width: 100% !important; }
      .full-wrap { width: 100% !important; min-width: auto !important; }
      .mj-column-per-60 { width: 100% !important; }
      .mj-column-per-31 { width: 100% !important; }

      /* Images scale to container */
      img { max-width: 100% !important; height: auto !important; }

      /* Stack two-column editorial sections (photo + editorial) */
      .mj-column-per-63 {
        width: 85% !important;
        float: left !important;
      }
      .mj-column-per-37 {
        width: 100% !important;
        text-align: center !important;
      }

      /* Stack KBA resource two columns */
      .mj-column-per-50 {
        width: 100% !important;
      }

      /* Stack section-3 contact + boxes columns */
      .s3-left, .s3-right {
        display: block !important;
        width: 100% !important;
        float: none !important;
        clear: both !important;
      }

      /* Fussy speech-bubble icon alignment on mobile */
      .speech-section1 { padding-left: 100px !important; }
      .speech-section2 { padding-right: 100px !important; }

      .auto-height { height: auto !important; padding: 0 !important; }
      .view-browser { display: none !important; }
    }
  </style>
</head>
